<!DOCTYPE html>
<html lang="ja">
	<head>
		<meta charset="UTF-8">
		<title>portfolio~contact~</title>
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<link rel="stylesheet" href="../css/reset_001.css">
		<link rel="stylesheet" href="../css/reset_002.css">
		<link rel="stylesheet" href="css/style.css">
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
		<link rel="shortcut icon" href="../images/favicon/favicon001.ico" type="image/x-icon">
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru&family=Noto+Sans+JP:wght@100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Quicksand:wght@300..700&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
	</head>
	<body>
		<div id="site-wrapper">
			<!-- <header id="site-header"></header> -->
			<main>
				<div class="contents">
					<div class="contents__title">
						<div class="title title--contact">Contact<span class="title__small">お問い合わせ</span></div>
					</div>
					<p class="contents__text">以下必要事項をご入力の上、お問い合わせください。
						<br>＊は必須になります。
						<br><a href="mailto:t72.hirao.minako@gmail.com?body=お名前：%0D%0Aお問い合わせ詳細：">メールでのお問い合わせはこちらから</a>
					</p>
					<div class="contents__form">
						<form id="js-form" action="" class="form">
							<div class="form__input">
								<label for="name" class="form__label">*</label>
								<input type="text" name="name" id="name" class="form__small js-name" placeholder="name" required>
							</div>
							<div class="form__input">
								<label for="email" class="form__label">*</label>
								<input type="text" name="email" id="email" class="form__small js-email" placeholder="e-mail" required>
							</div>
							<div class="form__input form__input--type01">
								<label for="message" class="form__label">*</label>
								<textarea type="" name="message" id="message" class="form__large js-comment" placeholder="お問い合わせ内容のご入力をお願いいたします。"></textarea>
							</div>
							<div class="form__btnarea">
								<!-- formで実装する場合はこちらに切り替える -->
								<!-- <input type="submit" value="send" class="form__btn js-contact-btn"> -->
								<a href="#" class="form__btn js-contact-btn">send</a>
							</div>
						</form>
					</div>
				</div>
			</main>
			<footer>
				<small>&copy;minako&nbsp;hirao</small>
				<ol class="breadcrumbs">
					<li class="breadcrumbs__list"><a href="../index.html" class="breadcrumbs__link">Home</a></li>
					<li class="breadcrumbs__list"><span class="breadcrumbs__text">Contact</span></li>
				</ol>
			</footer>

			<div class="pagetop"><a href="../index.html" class="pagetop__btn"><span class="pagetop__btn-text">TOP</span></a></div>
		</div>
		<script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
		<script src="../js/script.js"></script>
	</body>
</html>
